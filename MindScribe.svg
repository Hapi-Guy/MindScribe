<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <style>
      .outline {
        fill: none;
        stroke: #000000;
        stroke-width: 14;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .solid {
        fill: #000000;
      }
      .cutout {
        fill: #FFFFFF;
      }
      .line {
        stroke: #FFFFFF;
        stroke-width: 5;
      }
    </style>
  </defs>

  <!-- Outline of the Head -->
  <path class="outline" d="
    M 135 85
    C 165 85, 195 95, 205 130
    L 207 145
    L 220 160
    L 210 165
    L 210 175
    C 210 185, 205 190, 200 190
    L 180 195
    L 180 220
    L 100 220
    L 100 180
    C 100 160, 90 145, 80 140" />

  <!-- Horizontal Lines of Text inside the Head -->
  <rect class="solid" x="125" y="115" width="60" height="10" />
  
  <rect class="solid" x="125" y="135" width="35" height="10" />
  <rect class="solid" x="170" y="135" width="15" height="10" />
  
  <rect class="solid" x="125" y="155" width="60" height="10" />

  <!-- Pencil Icon -->
  <g transform="translate(100, 100) scale(0.65) rotate(-45)">
    <!-- Pencil Body -->
    <path class="solid" d="M -15 -35 C -15 -45, 15 -45, 15 -35 L 15 20 L -15 20 Z" />
    
    <!-- Metal Band Cutout -->
    <line class="line" x1="-16" y1="-25" x2="16" y2="-25" />
    
    <!-- Pencil Cone Base -->
    <path class="solid" d="M -15 20 L 0 45 L 15 20 Z" />
    
    <!-- Wood Texture Cutout -->
    <polygon class="cutout" points="-9,22 9,22 0,35" />
  </g>
</svg>
